repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: ruff check
        language: system
        types: [python]
        pass_filenames: false

      - id: bandit
        name: bandit (with bandit.yaml config)
        entry: bandit -r . --configfile bandit.yaml
        language: system
        types: [python]
        pass_filenames: false
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: 'v1.17.1'
    hooks:
    -   id: mypy
        args: [--ignore-missing-imports]
      
