name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: expense_db
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
        ports:
          - 6000:5432
        options: >-
          --health-cmd "pg_isready"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:6.2-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://user:password@localhost:6000/expense_db
      DATABASE_URL_ALEMBIC: postgresql://user:password@localhost:6000/expense_db
      CELERY_BROKER_URL: redis://localhost:6379/0
      CELERY_RESULT_BACKEND: redis://localhost:6379/1
      CELERY_MODULE: app.services.celery_worker_service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Load env file manually
        run: cat pytest.env >> $GITHUB_ENV

      - name: Install uv
        run: pip install uv

      - name: Install project dependencies with uv
        run: |
          uv venv .venv
          source .venv/bin/activate
          uv pip install -e .
          uv pip install pytest pytest-cov pre-commit alembic

      - name: Run migrations
        run: |
          source .venv/bin/activate
          alembic -x url=$DATABASE_URL_ALEMBIC upgrade head

      - name: Run tests with coverage
        run: |
          source .venv/bin/activate
          pytest -s --cov=app --cov-report=xml --cov-report=term tests/

      - name: Check coverage >= 80%
        run: |
          source .venv/bin/activate
          coverage report --fail-under=80

      - name: Run pre-commit checks
        run: |
          source .venv/bin/activate
          pre-commit run --all-files
